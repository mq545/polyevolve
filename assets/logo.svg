<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PolyEvolve">
  <defs>
    <linearGradient id="pe-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#pe-grad)"/>

  <!-- evolutionary graph: generations branching left -> champion -->
  <g stroke="#FFFFFF" stroke-width="6.4" stroke-opacity="0.67" stroke-linecap="round">
    <line x1="153.6" y1="256"    x2="266.24" y2="174.08"/>
    <line x1="153.6" y1="256"    x2="266.24" y2="337.92"/>
    <line x1="266.24" y1="174.08" x2="378.88" y2="133.12"/>
    <line x1="266.24" y1="174.08" x2="378.88" y2="256"/>
    <line x1="266.24" y1="337.92" x2="378.88" y2="256"/>
    <line x1="266.24" y1="337.92" x2="378.88" y2="378.88"/>
  </g>

  <!-- nodes -->
  <g fill="#FFFFFF">
    <circle cx="153.6"  cy="256"    r="23"/>
    <circle cx="266.24" cy="174.08" r="23"/>
    <circle cx="266.24" cy="337.92" r="23"/>
    <circle cx="378.88" cy="133.12" r="23"/>
    <circle cx="378.88" cy="378.88" r="23"/>
  </g>

  <!-- champion -->
  <circle cx="378.88" cy="256" r="51.5" fill="none" stroke="#FFFFFF" stroke-width="6.4" stroke-opacity="0.5"/>
  <circle cx="378.88" cy="256" r="39" fill="#FFFFFF"/>
</svg>
