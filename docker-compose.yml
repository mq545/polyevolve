services:
  postgres:
    image: postgres:16
    container_name: superpod_postgres
    environment:
      POSTGRES_USER: superpod
      POSTGRES_PASSWORD: superpod
      POSTGRES_DB: superpod
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/polyevolve/storage/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superpod -d superpod"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
    container_name: superpod_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgresql://superpod:superpod@postgres:5432/superpod
    env_file:
      - .env
    profiles:
      - manual

volumes:
  pgdata:
